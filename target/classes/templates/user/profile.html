<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{profile.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h2 th:text="#{profile.title}">My Profile</h2>

            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <!-- Info -->
            <div class="card mb-4">
                <div class="card-body">
                    <p><strong th:text="#{profile.username}">Username</strong>: <span th:text="${user.username}"></span></p>
                    <p><strong th:text="#{profile.firstName}">First Name</strong>: <span
                            th:text="${user.firstName ?: '-'}"></span></p>
                    <p><strong th:text="#{profile.lastName}">Last Name</strong>: <span
                            th:text="${user.lastName ?: '-'}"></span></p>
                    <p><strong th:text="#{profile.email}">Email</strong>: <span th:text="${user.email ?: '-'}"></span>
                    </p>
                    <p><strong th:text="#{profile.phone}">Phone</strong>: <span th:text="${user.phoneNumber ?: '-'}"></span></p>
                    <p><strong th:text="#{profile.balance}">Balance</strong>: $<span th:text="${user.balance}"></span></p>
                </div>
            </div>

            <!-- Top Up -->
            <div class="card mb-4">
                <div class="card-body">
                    <h5 th:text="#{profile.topup}">Top Up</h5>
                    <form th:action="@{/profile/topup}" method="post" class="row g-2">
                        <div class="col-8">
                            <input type="number" step="0.01" min="0.01" name="amount" class="form-control"
                                   th:placeholder="#{profile.topup.amount}" required/>
                        </div>
                        <div class="col-4">
                            <button type="submit" class="btn btn-success w-100" th:text="#{profile.topup}">Top Up</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Update Profile -->
            <div class="card">
                <div class="card-body">
                    <h5 th:text="#{profile.update}">Update Profile</h5>
                    <form th:action="@{/profile/update}" th:object="${updateDTO}" method="post" novalidate>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label" th:text="#{profile.firstName}">First Name</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       th:field="*{firstName}"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                                     th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label" th:text="#{profile.lastName}">Last Name</label>
                                <input type="text" class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       th:field="*{lastName}"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                                     th:errors="*{lastName}"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{profile.email}">Email</label>
                            <input type="email" class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   th:field="*{email}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{profile.phone}">Phone</label>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                   th:field="*{phoneNumber}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{profile.change.password}">Password</label>
                            <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   th:field="*{password}" th:placeholder="#{profile.change.password}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label" th:text="#{auth.register.confirmPassword}">Confirm Password</label>
                            <input type="password" class="form-control" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                                   th:field="*{confirmPassword}" th:placeholder="#{auth.register.confirmPassword}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary" th:text="#{common.save}">Save</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
