<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{auth.register.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card">
                <div class="card-body">
                    <h3 class="card-title text-center mb-4" th:text="#{auth.register.title}">Registration</h3>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/register}" th:object="${registerDTO}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label" th:text="#{auth.register.username}">Username</label>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   id="username" th:field="*{username}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="firstName" class="form-label" th:text="#{profile.firstName}">First Name</label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       id="firstName" th:field="*{firstName}"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="lastName" class="form-label" th:text="#{profile.lastName}">Last Name</label>
                                <input type="text" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       id="lastName" th:field="*{lastName}"/>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label" th:text="#{profile.email}">Email</label>
                            <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   id="email" th:field="*{email}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label" th:text="#{auth.register.password}">Password</label>
                            <input type="password" class="form-control" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   id="password" th:field="*{password}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="phoneNumber" class="form-label" th:text="#{auth.register.phone}">Phone</label>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? 'is-invalid'"
                                   id="phoneNumber" th:field="*{phoneNumber}"/>
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100" th:text="#{auth.register.submit}">Register</button>
                    </form>

                    <p class="text-center mt-3">
                        <a th:href="@{/login}" th:text="#{auth.register.login.link}">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
