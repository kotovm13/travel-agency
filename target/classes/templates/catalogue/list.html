<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
>
<head th:replace="~{fragments/layout :: head(#{catalogue.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h2 th:text="#{catalogue.title}">Tour Catalogue</h2>

    <!-- Filter toggle + sort bar -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-outline-primary" type="button" data-bs-toggle="collapse" data-bs-target="#filterPanel">
            <span th:text="#{common.filter}">Filters</span> &#9662;
        </button>
        <form th:action="@{/catalogue}" th:object="${filter}" method="get" class="d-flex gap-2 align-items-center">
            <!-- Hidden fields to preserve filters when only changing sort -->
            <input type="hidden" th:field="*{tourType}"/>
            <input type="hidden" th:field="*{transferType}"/>
            <input type="hidden" th:field="*{hotelType}"/>
            <input type="hidden" th:field="*{search}"/>
            <input type="hidden" th:field="*{minPrice}"/>
            <input type="hidden" th:field="*{maxPrice}"/>
            <label class="form-label mb-0 me-1" th:text="#{catalogue.filter.sort}">Sort</label>
            <select th:field="*{sort}" class="form-select form-select-sm" style="width: auto;"
                    onchange="this.form.submit()">
                <option value="" th:text="#{catalogue.sort.default}">Hot first</option>
                <option value="price_asc" th:text="#{catalogue.sort.price.asc}">Price: Low to High</option>
                <option value="price_desc" th:text="#{catalogue.sort.price.desc}">Price: High to Low</option>
                <option value="discount_desc" th:text="#{catalogue.sort.discount}">Biggest Discount</option>
            </select>
        </form>
    </div>

    <!-- Collapsible filter panel -->
    <div class="collapse mb-4" id="filterPanel">
        <div class="card">
            <div class="card-body">
                <form th:action="@{/catalogue}" th:object="${filter}" method="get">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.tourType}">Tour Type</label>
                            <select th:field="*{tourType}" class="form-select form-select-sm">
                                <option value="">--</option>
                                <option th:each="type : ${tourTypes}" th:value="${type}"
                                        th:text="#{${'tourType.' + type}}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.transferType}">Transfer Type</label>
                            <select th:field="*{transferType}" class="form-select form-select-sm">
                                <option value="">--</option>
                                <option th:each="type : ${transferTypes}" th:value="${type}"
                                        th:text="#{${'transferType.' + type}}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.hotelType}">Hotel Type</label>
                            <select th:field="*{hotelType}" class="form-select form-select-sm">
                                <option value="">--</option>
                                <option th:each="type : ${hotelTypes}" th:value="${type}"
                                        th:text="#{${'hotelType.' + type}}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.search}">Search</label>
                            <input type="text" th:field="*{search}" class="form-control form-control-sm"/>
                        </div>
                    </div>
                    <div class="row g-3 align-items-end mt-2">
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.minPrice}">Min Price</label>
                            <input type="number" step="100" min="0" th:field="*{minPrice}"
                                   class="form-control form-control-sm"/>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label" th:text="#{catalogue.filter.maxPrice}">Max Price</label>
                            <input type="number" step="100" min="0" th:field="*{maxPrice}"
                                   class="form-control form-control-sm"/>
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary btn-sm w-100" th:text="#{common.filter}">
                                Apply
                            </button>
                        </div>
                        <div class="col-md-2">
                            <a th:href="@{/catalogue}" class="btn btn-outline-secondary btn-sm w-100"
                               th:text="#{common.reset}">Reset</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${error == null and vouchers.isEmpty()}" class="alert alert-info" th:text="#{catalogue.empty}">No tours</div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="v : ${vouchers}">
            <div class="card h-100 voucher-card">
                <div class="card-body">
                    <div class="d-flex justify-content-between mb-2">
                        <h5 class="card-title mb-0" th:text="${v.title}">Title</h5>
                        <div>
                            <span th:if="${v.hot}" class="badge bg-danger" th:text="#{catalogue.hot.badge}">HOT</span>
                            <span th:if="${v.discount > 0}" class="badge bg-warning"
                                  th:text="#{catalogue.discount.badge(${v.discount})}">% OFF</span>
                        </div>
                    </div>
                    <p class="card-text text-muted" th:text="${#strings.abbreviate(v.description, 100)}">Description</p>

                    <div class="mb-2">
                        <small class="text-muted">
                            <span th:text="#{${'tourType.' + v.tourType}}">Type</span> |
                            <span th:text="#{${'transferType.' + v.transferType}}">Transfer</span> |
                            <span th:text="#{${'hotelType.' + v.hotelType}}">Hotel</span>
                        </small>
                    </div>
                    <div class="mb-2">
                        <small class="text-muted" th:text="${#temporals.format(v.arrivalDate, 'dd MMM yyyy') + ' - ' + #temporals.format(v.evictionDate, 'dd MMM yyyy')}">Dates</small>
                    </div>

                    <div class="mb-2">
                        <small th:if="${v.availableQuantity > 0}" class="text-success"
                               th:text="#{catalogue.available.quantity(${v.availableQuantity})}">5 spots left</small>
                        <small th:if="${v.availableQuantity <= 0}" class="text-danger fw-bold"
                               th:text="#{catalogue.sold.out}">Sold Out</small>
                    </div>

                    <div class="mb-3">
                        <span th:if="${v.discount > 0}" class="price-original" th:text="'$' + ${v.price}">$1000</span>
                        <span th:if="${v.discount > 0}" class="price-discounted"
                              th:text="'$' + ${#numbers.formatDecimal(v.price * (100 - v.discount) / 100, 1, 2)}">$800</span>
                        <span th:if="${v.discount == 0}" class="fw-bold" th:text="'$' + ${v.price}">$1000</span>
                    </div>
                </div>
                <div class="card-footer">
                    <a th:href="@{/catalogue/{id}(id=${v.id})}" class="btn btn-outline-primary btn-sm"
                       th:text="#{catalogue.details}">Details</a>
                    <form th:if="${#authorization.expression('isAuthenticated()') and v.availableQuantity > 0}"
                          th:action="@{/catalogue/{id}/order(id=${v.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-success btn-sm" th:text="#{catalogue.order}">Order</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${vouchers.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${vouchers.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalogue(page=${vouchers.number - 1}, tourType=${filter.tourType}, transferType=${filter.transferType}, hotelType=${filter.hotelType}, search=${filter.search}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sort=${filter.sort})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, vouchers.totalPages - 1)}"
                th:classappend="${i == vouchers.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/catalogue(page=${i}, tourType=${filter.tourType}, transferType=${filter.transferType}, hotelType=${filter.hotelType}, search=${filter.search}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sort=${filter.sort})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${vouchers.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/catalogue(page=${vouchers.number + 1}, tourType=${filter.tourType}, transferType=${filter.transferType}, hotelType=${filter.hotelType}, search=${filter.search}, minPrice=${filter.minPrice}, maxPrice=${filter.maxPrice}, sort=${filter.sort})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
