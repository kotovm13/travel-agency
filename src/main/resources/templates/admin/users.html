<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(#{admin.users.title})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <h2 th:text="#{admin.users.title}">User Management</h2>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Search + Filters -->
    <form th:action="@{/admin/users}" method="get" class="mb-3 row g-2 align-items-end">
        <div class="col-md-2">
            <input type="text" name="search" class="form-control form-control-sm"
                   th:placeholder="#{admin.users.search}" th:value="${search}"/>
        </div>
        <div class="col-md-2">
            <input type="text" name="email" class="form-control form-control-sm"
                   th:placeholder="#{admin.users.search.email}" th:value="${email}"/>
        </div>
        <div class="col-md-2">
            <select name="roleFilter" class="form-select form-select-sm">
                <option value="" th:text="#{admin.users.filter.allRoles}">All Roles</option>
                <option th:each="r : ${roles}" th:value="${r}" th:selected="${r.name() == roleFilter}"
                        th:text="#{${'role.' + r}}"></option>
            </select>
        </div>
        <div class="col-md-2">
            <select name="statusFilter" class="form-select form-select-sm">
                <option value="" th:text="#{admin.users.filter.allStatuses}">All Statuses</option>
                <option value="active" th:selected="${statusFilter == 'active'}" th:text="#{admin.users.active}">
                    Active
                </option>
                <option value="blocked" th:selected="${statusFilter == 'blocked'}" th:text="#{admin.users.blocked}">
                    Blocked
                </option>
            </select>
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-sm" th:text="#{common.filter}">Filter</button>
        </div>
        <div class="col-auto"
             th:if="${(search != null and !search.isBlank()) or (email != null and !email.isBlank()) or (roleFilter != null and !roleFilter.isBlank()) or (statusFilter != null and !statusFilter.isBlank())}">
            <a th:href="@{/admin/users}" class="btn btn-outline-secondary btn-sm"
               th:text="#{common.reset}">Reset</a>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th th:text="#{profile.username}">Username</th>
                <th th:text="#{profile.email}">Email</th>
                <th th:text="#{admin.users.role}">Role</th>
                <th th:text="#{profile.phone}">Phone</th>
                <th th:text="#{profile.balance}">Balance</th>
                <th th:text="#{admin.users.status}">Status</th>
                <th th:text="#{common.actions}">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.username}">user</td>
                <td th:text="${u.email}">email@example.com</td>
                <td><span class="badge" th:classappend="${u.role == 'ADMIN'} ? 'bg-danger' : (${u.role == 'MANAGER'} ? 'bg-primary' : 'bg-secondary')"
                          th:text="#{${'role.' + u.role}}">Role</span></td>
                <td th:text="${u.phoneNumber ?: '-'}">Phone</td>
                <td th:text="'$' + ${u.balance}">$0</td>
                <td>
                    <span th:if="${u.active}" class="badge bg-success" th:text="#{admin.users.active}">Active</span>
                    <span th:if="${!u.active}" class="badge bg-danger" th:text="#{admin.users.blocked}">Blocked</span>
                </td>
                <td>
                    <div class="d-flex gap-1 align-items-center">
                        <a th:href="@{/admin/users/{id}(id=${u.id})}" class="btn btn-outline-info btn-sm"
                           th:text="#{admin.users.view}">View</a>
                        <th:block th:if="${u.username != currentUsername}">
                            <form th:if="${u.active}" th:action="@{/admin/users/{id}/block(id=${u.id})}" method="post"
                                  class="d-inline">
                                <button type="submit" class="btn btn-outline-danger btn-sm"
                                        th:text="#{admin.users.block}">Block
                                </button>
                            </form>
                            <form th:if="${!u.active}" th:action="@{/admin/users/{id}/unblock(id=${u.id})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-success btn-sm"
                                        th:text="#{admin.users.unblock}">Unblock
                                </button>
                            </form>
                            <form th:action="@{/admin/users/{id}/role(id=${u.id})}" method="post" class="d-inline">
                                <select name="role" class="form-select form-select-sm d-inline w-auto"
                                        onchange="this.form.submit()">
                                    <option value="USER" th:selected="${u.role == 'USER'}" th:text="#{role.USER}">User
                                    </option>
                                    <option value="MANAGER" th:selected="${u.role == 'MANAGER'}"
                                            th:text="#{role.MANAGER}">Manager
                                    </option>
                                    <option value="ADMIN" th:selected="${u.role == 'ADMIN'}" th:text="#{role.ADMIN}">
                                        Admin
                                    </option>
                                </select>
                            </form>
                        </th:block>
                        <span th:if="${u.username == currentUsername}" class="text-muted">-</span>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${users.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${users.number - 1}, search=${search}, email=${email}, roleFilter=${roleFilter}, statusFilter=${statusFilter})}">&laquo;</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                th:classappend="${i == users.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${i}, search=${search}, email=${email}, roleFilter=${roleFilter}, statusFilter=${statusFilter})}"
                   th:text="${i + 1}">1</a>
            </li>
            <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/admin/users(page=${users.number + 1}, search=${search}, email=${email}, roleFilter=${roleFilter}, statusFilter=${statusFilter})}">&raquo;</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
