<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${isEdit} ? #{manager.vouchers.edit} : #{manager.vouchers.create})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 th:text="${isEdit} ? #{manager.vouchers.edit} : #{manager.vouchers.create}">Voucher Form</h2>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="${isEdit} ? @{/manager/vouchers/{id}/edit(id=${voucherId})} : @{/manager/vouchers/new}"
                  th:object="${voucherForm}" method="post" novalidate>

                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label" th:text="#{voucher.title}">Title</label>
                        <input type="text" class="form-control" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'"
                               th:field="*{title}"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" th:text="#{voucher.price}">Price</label>
                        <input type="number" step="0.01" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                               th:field="*{price}"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label" th:text="#{voucher.description}">Description</label>
                    <textarea class="form-control" rows="3" th:classappend="${#fields.hasErrors('description')} ? 'is-invalid'"
                              th:field="*{description}"></textarea>
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label" th:text="#{voucher.tourType}">Tour Type</label>
                        <select class="form-select" th:classappend="${#fields.hasErrors('tourType')} ? 'is-invalid'"
                                th:field="*{tourType}">
                            <option value="">--</option>
                            <option th:each="type : ${tourTypes}" th:value="${type}" th:text="#{${'tourType.' + type}}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('tourType')}" th:errors="*{tourType}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" th:text="#{voucher.transferType}">Transfer Type</label>
                        <select class="form-select" th:classappend="${#fields.hasErrors('transferType')} ? 'is-invalid'"
                                th:field="*{transferType}">
                            <option value="">--</option>
                            <option th:each="type : ${transferTypes}" th:value="${type}" th:text="#{${'transferType.' + type}}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('transferType')}" th:errors="*{transferType}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label" th:text="#{voucher.hotelType}">Hotel Type</label>
                        <select class="form-select" th:classappend="${#fields.hasErrors('hotelType')} ? 'is-invalid'"
                                th:field="*{hotelType}">
                            <option value="">--</option>
                            <option th:each="type : ${hotelTypes}" th:value="${type}" th:text="#{${'hotelType.' + type}}"></option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('hotelType')}" th:errors="*{hotelType}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{voucher.arrivalDate}">Arrival Date</label>
                        <input type="date" class="form-control" th:classappend="${#fields.hasErrors('arrivalDate')} ? 'is-invalid'"
                               th:field="*{arrivalDate}"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('arrivalDate')}" th:errors="*{arrivalDate}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label" th:text="#{voucher.evictionDate}">Eviction Date</label>
                        <input type="date" class="form-control" th:classappend="${#fields.hasErrors('evictionDate')} ? 'is-invalid'"
                               th:field="*{evictionDate}"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('evictionDate')}" th:errors="*{evictionDate}"></div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label" th:text="#{voucher.quantity}">Quantity</label>
                        <input type="number" min="1" class="form-control"
                               th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                               th:field="*{quantity}"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('quantity')}"
                             th:errors="*{quantity}"></div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <label class="form-label" th:text="#{voucher.discount}">Discount %</label>
                        <input type="number" min="0" max="100" class="form-control" th:field="*{discount}"/>
                    </div>
                    <div class="col-md-3 mb-3 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" th:field="*{hot}" id="hotCheck"/>
                            <label class="form-check-label" for="hotCheck" th:text="#{voucher.hot}">Hot Deal</label>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" th:text="#{common.save}">Save</button>
                    <a th:href="@{/manager/vouchers}" class="btn btn-outline-secondary" th:text="#{common.cancel}">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
